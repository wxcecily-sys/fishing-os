name: Build Fishing OS ISO

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            wget \
            xorriso \
            squashfs-tools \
            grub-pc-bin \
            grub-efi-amd64-bin \
            mtools \
            7zip \
            debootstrap \
            ubuntu-keyring \
            genisoimage \
            uuid-runtime \
            docker.io

      - name: Start Docker
        run: |
          sudo systemctl start docker
          sudo docker run --privileged --rm -d --name fishing-builder ubuntu:22.04 sleep infinity
          
      - name: Download Ubuntu Base in Docker
        run: |
          sudo docker exec fishing-builder bash -c "
            apt update && apt install -y debootstrap squashfs-tools
            debootstrap --arch=amd64 jammy /fishing-system http://archive.ubuntu.com/ubuntu/
          "
          
      - name: Setup System in Docker
        run: |
          sudo docker exec fishing-builder bash -c "
            set -e
            SYSTEM_DIR=/fishing-system
            
            # Copy sources
            cp /etc/apt/sources.list \$SYSTEM_DIR/etc/apt/sources.list || true
            
            # Chroot and install
            mount --bind /dev \$SYSTEM_DIR/dev || true
            mount -t proc proc \$SYSTEM_DIR/proc || true
            mount -t sysfs sys \$SYSTEM_DIR/sys || true
            
            echo 'LANG=en_US.UTF-8' > \$SYSTEM_DIR/etc/locale.conf
            echo 'LC_ALL=en_US.UTF-8' >> \$SYSTEM_DIR/etc/locale.conf
            
            chroot \$SYSTEM_DIR /bin/bash << 'CHROOT'
            export DEBIAN_FRONTEND=noninteractive
            apt update
            apt install -y xfce4 xfce4-goodies lightdm || true
            dpkg --add-architecture i386 || true
            apt update
            apt install -y wine || true
            curl -fsSL https://ollama.com/install.sh | sh || true
            apt install -y firefox libreoffice vlc || true
            apt install -y git curl wget python3 python3-pip || true
            apt install -y gamemode neofetch htop || true
            apt clean
            rm -rf /var/lib/apt/lists/*
            useradd -m -s /bin/bash fishing || true
            echo 'fishing:fishing' | chpasswd || true
            usermod -aG sudo fishing || true
            echo 'fishing-os' > /etc/hostname
            mkdir -p /opt/fishing-os
            CHROOT
            
            # Copy MCP server
            docker cp ${{ github.workspace }}/mcp-server fishing-builder:\$SYSTEM_DIR/opt/fishing-os/
            
            # Unmount
            umount \$SYSTEM_DIR/proc || true
            umount \$SYSTEM_DIR/sys || true
            umount \$SYSTEM_DIR/dev || true
          "
          
      - name: Create ISO Structure
        run: |
          mkdir -p output/iso/casper
          mkdir -p output/iso/boot/grub
          
          # Export Docker container filesystem
          sudo docker export fishing-builder > fishing-system.tar
          
          # Or create squashfs from docker
          sudo docker cp fishing-builder:/fishing-system ./fishing-system-extracted || true
          
          # If extract failed, use alternative
          if [ ! -d "./fishing-system-extracted" ]; then
            mkdir -p fishing-system-extracted
            cd fishing-system-extracted
            sudo docker run --rm -v \$(pwd):/workspace ubuntu:22.04 bash -c "
              debootstrap --arch=amd64 jammy /workspace/base http://archive.ubuntu.com/ubuntu/ && 
              mksquashfs /workspace/base /workspace/filesystem.squashfs
            "
            mv filesystem.squashfs output/iso/casper/
          fi
          
      - name: Stop Docker
        if: always()
        run: |
          sudo docker stop fishing-builder || true
          
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: fishing-os-rootfs
          path: |
            fishing-system.tar
            output/
          retention-days: 30
