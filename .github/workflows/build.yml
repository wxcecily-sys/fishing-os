name: Build Fishing OS RootFS

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build RootFS with Docker
        run: |
          # 创建 Dockerfile
          cat > Dockerfile << 'EOF'
          FROM ubuntu:22.04
          
          ENV DEBIAN_FRONTEND=noninteractive
          ENV LANG=en_US.UTF-8
          ENV LC_ALL=en_US.UTF-8
          
          # 安装基础工具和 zstd (Ollama 需要)
          RUN apt update && apt install -y \
            locales \
            zstd \
            && locale-gen en_US.UTF-8 \
            && apt install -y \
            xfce4 \
            xfce4-goodies \
            lightdm \
            firefox \
            libreoffice \
            vlc \
            gamemode \
            git \
            curl \
            wget \
            python3 \
            python3-pip \
            neofetch \
            htop \
            software-properties-common \
            && add-apt-repository universe \
            && dpkg --add-architecture i386 \
            && apt update \
            && apt install -y \
            wine \
            wine64 \
            || true
          
          # 安装 Ollama (本地 AI) - 现在 zstd 已安装
          RUN curl -fsSL https://ollama.com/install.sh | sh || true
          
          # 创建 fishing 用户
          RUN useradd -m -s /bin/bash fishing || true \
            && echo 'fishing:fishing' | chpasswd || true \
            && usermod -aG sudo fishing || true
          
          # 设置主机名 (只写 hostname，不写 hosts)
          RUN echo 'fishing-os' > /etc/hostname
          
          # 创建 MCP 目录
          RUN mkdir -p /opt/fishing-os/mcp-server
          
          # 清理
          RUN apt clean \
            && rm -rf /var/lib/apt/lists/* \
            && rm -rf /tmp/* \
            && rm -rf /var/tmp/*
          
          CMD ["/bin/bash"]
          EOF
          
          # 构建 Docker 镜像
          docker build -t fishing-os:latest .
          
          # 创建容器并导出
          docker create --name fishing-container fishing-os:latest
          docker export fishing-container -o fishing-os-rootfs.tar
          
          # 压缩
          gzip fishing-os-rootfs.tar
          
          ls -lh fishing-os-rootfs.tar.gz

      - name: Create ISO Structure (Optional)
        run: |
          # 创建简单的 ISO 结构
          mkdir -p output/iso/casper
          mkdir -p output/iso/boot/grub
          
          # 复制 rootfs
          cp fishing-os-rootfs.tar.gz output/iso/casper/filesystem.tar.gz
          
          # 创建 GRUB 配置
          cat > output/iso/boot/grub/grub.cfg << 'GRUB'
          set timeout=10
          set default=0
          
          menuentry "Try Fishing OS" {
              linux /casper/vmlinuz boot=casper quiet splash
              initrd /casper/initrd
          }
          GRUB
          
          echo "⚠️ 注意：这是一个简化的 rootfs，完整 ISO 需要额外步骤"

      - name: Generate Build Info
        run: |
          cat > build-info.txt << 'INFO'
          ========================================
          🐟 Fishing OS 1.0 - Build Artifact
          ========================================
          
          构建时间: $(date)
          构建方式: GitHub Actions + Docker
          
          包含内容:
          - Ubuntu 22.04 基础系统
          - XFCE4 桌面环境
          - Wine (Windows 兼容层)
          - Firefox 浏览器
          - LibreOffice 办公套件
          - VLC 多媒体播放器
          - GameMode 游戏优化
          - 开发工具 (Git, Python3, etc.)
          - Ollama (本地 AI 引擎)
          - MCP Server (AI 助手框架)
          
          使用方法:
          1. 下载 fishing-os-rootfs.tar.gz
          2. 解压: tar -xzf fishing-os-rootfs.tar.gz
          3. 用工具 (如 Cubic) 打包成 ISO
          4. 或者直接在虚拟机/实体机使用
          
          默认用户:
          - 用户名: fishing
          - 密码: fishing
          
          ========================================
          INFO
          
          cat build-info.txt

      - name: Upload RootFS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: fishing-os-rootfs
          path: |
            fishing-os-rootfs.tar.gz
            output/
            build-info.txt
            mcp-server/
          retention-days: 30

      - name: Build Summary
        run: |
          echo "================================"
          echo "🐟 Fishing OS Build Complete!"
          echo "================================"
          echo "✅ RootFS 已生成"
          echo "✅ 大小: $(ls -lh fishing-os-rootfs.tar.gz | awk '{print $5}')"
          echo ""
          echo "📦 下载地址:"
          echo "   GitHub Actions → Artifacts → fishing-os-rootfs"
          echo ""
          echo "📍 下一步:"
          echo "   1. 下载 Artifact"
          echo "   2. 解压得到 rootfs"
          echo "   3. 用 Cubic 或手动打包成 ISO"
          echo "================================"
