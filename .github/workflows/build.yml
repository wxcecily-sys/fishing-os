name: Build Fishing OS

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt update
          sudo apt install -y \
            wget \
            qemu-utils \
            libguestfs-tools \
            genisoimage \
            squashfs-tools \
            xorriso \
            grub-pc-bin \
            grub-efi-amd64-bin

      - name: Download Ubuntu Base Image
        run: |
          # Download Ubuntu 22.04 cloud image (smaller than desktop)
          wget -q https://cloud-images.ubuntu.com/jammy/current/jammy-server-cloudimg-amd64.img -O ubuntu-base.img
          ls -lh ubuntu-base.img

      - name: Customize Image
        run: |
          # Install packages using virt-customize
          sudo virt-customize -a ubuntu-base.img \
            --install "xfce4,xfce4-goodies,lightdm,wine,wine64,firefox,libreoffice,vlc,gamemode,git,curl,wget,python3,python3-pip,neofetch,htop" \
            --run-command "useradd -m -s /bin/bash -p \$(echo 'fishing' | openssl passwd -1 -stdin) fishing" \
            --run-command "usermod -aG sudo fishing" \
            --run-command "echo 'fishing-os' > /etc/hostname" \
            --run-command "echo '127.0.0.1 fishing-os' >> /etc/hosts" \
            --run-command "curl -fsSL https://ollama.com/install.sh | sh" \
            --run-command "mkdir -p /opt/fishing-os" \
            --copy-in mcp-server:/opt/fishing-os/ \
            --run-command "chmod +x /opt/fishing-os/mcp-server/assistant.py" \
            --run-command "apt clean" \
            --run-command "rm -rf /var/lib/apt/lists/*" \
            --selinux-relabel
          
          echo "✅ Image customized"

      - name: Convert to RootFS
        run: |
          # Mount the image and extract filesystem
          mkdir -p /tmp/mountpoint
          sudo guestmount -a ubuntu-base.img -m /dev/sda1 /tmp/mountpoint
          
          # Create squashfs
          sudo mksquashfs /tmp/mountpoint fishing-os.squashfs -comp xz -Xbcj x86
          
          # Unmount
          sudo guestunmount /tmp/mountpoint
          
          ls -lh fishing-os.squashfs

      - name: Create ISO Structure
        run: |
          mkdir -p output/iso/{casper,boot/grub}
          
          # Copy squashfs
          cp fishing-os.squashfs output/iso/casper/filesystem.squashfs
          
          # Create manifest
          echo "fishing-os 1.0" > output/iso/casper/filesystem.manifest
          
          # Create grub config
          cat > output/iso/boot/grub/grub.cfg << 'GRUB'
          set timeout=10
          set default=0
          
          menuentry "Try Fishing OS without installing" {
              linux /casper/vmlinuz boot=casper quiet splash
              initrd /casper/initrd
          }
          
          menuentry "Install Fishing OS" {
              linux /casper/vmlinuz boot=casper only-ubiquity quiet splash
              initrd /casper/initrd
          }
          GRUB
          
          # Note: For complete ISO, we'd need kernel and initrd from the image
          # This is a simplified version
          echo "⚠️ ISO structure created (simplified)"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: fishing-os-rootfs
          path: |
            fishing-os.squashfs
            output/
          retention-days: 30

      - name: Summary
        run: |
          echo "================================"
          echo "🐟 Fishing OS Build Complete!"
          echo "================================"
          echo "Files created:"
          ls -lh fishing-os.squashfs output/ 2>/dev/null || true
          echo ""
          echo "Next steps:"
          echo "1. Download the artifact"
          echo "2. Use Cubic or similar tool to create bootable ISO"
          echo "3. Or use the squashfs directly with a live CD setup"
          echo "================================"
